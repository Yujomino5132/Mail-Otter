name: Continuous Integration

permissions:
  contents: read

on:
  repository_dispatch:
    types:
      - Upstream Sync
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: continuous-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install Dependencies
        uses: ./.github/actions/retry-step
        with:
          command: pnpm install
          max_attempts: '3'

      - name: Run Type Check and Lint
        uses: ./.github/actions/retry-step
        with:
          command: pnpm -r typecheck && pnpm run lint
          max_attempts: '2'

      - name: Run Tests with Coverage
        uses: ./.github/actions/retry-step
        with:
          command: pnpm run test:coverage
          max_attempts: '2'

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install Dependencies
        uses: ./.github/actions/retry-step
        with:
          command: pnpm install
          max_attempts: '3'

      - name: Run Integration Tests
        uses: ./.github/actions/retry-step
        with:
          command: pnpm run test:integration
          max_attempts: '2'

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install Dependencies
        uses: ./.github/actions/retry-step
        with:
          command: pnpm install
          max_attempts: '3'

      - name: Build Web App
        run: pnpm --filter @mail-otter/web build

      - name: Type Check API Worker
        run: pnpm --filter @mail-otter/api typecheck

  dependabot-auto-merge:
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.user.login == 'dependabot[bot]' && github.event.pull_request.state == 'open' && !github.event.repository.fork }}
    name: Auto-Merge Dependabot PR
    needs:
      - checks
      - build
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Enable Auto-Merge
        uses: ./.github/actions/retry-step
        with:
          command: gh pr merge --auto --merge "$PR_URL"
          max_attempts: '2'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}

  dispatch-upstream-sync-deployment:
    if: ${{ github.event_name == 'repository_dispatch' && github.event.action == 'Upstream Sync' }}
    name: Dispatch Upstream Sync Deployment
    needs:
      - checks
      - build
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Dispatch Deployment
        uses: ./.github/actions/retry-step
        with:
          command: >
            printf '{"event_type":"Upstream Sync Deployment","client_payload":{"branch":"%s","sha":"%s"}}\n'
            "$PAYLOAD_BRANCH" "$PAYLOAD_SHA"
            | gh api repos/${{ github.repository }}/dispatches --method POST --input -
          max_attempts: '2'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PAYLOAD_BRANCH: ${{ github.event.client_payload.branch || 'main' }}
          PAYLOAD_SHA: ${{ github.event.client_payload.sha || github.sha }}
