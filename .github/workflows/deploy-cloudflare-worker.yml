name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  workflow_run:
    workflows: [Upstream Sync]
    types: [completed]

jobs:
  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Dependencies
        run: pnpm install

      - name: Dump WRANGLER_JSONC to Repository
        run: |
          if [ ! -f "wrangler.jsonc" ]; then
            echo "${WRANGLER_JSONC}" > wrangler.jsonc
          fi
        env:
          WRANGLER_JSONC: ${{ vars.WRANGLER_JSONC }}

      - name: Check Wrangler Configuration Version
        run: |
          CURRENT_VERSION=$(grep '"$version"' wrangler.jsonc | sed 's/.*: *\([0-9]*\).*/\1/' 2>/dev/null || echo "0")
          CURRENT_VERSION=${CURRENT_VERSION:-0}
          MINIMUM_TEMPLATE_VERSION=$(grep '"$minimumVersion"' apps/api/wrangler.template.jsonc | sed 's/.*: *\([0-9]*\).*/\1/')
          if [ "$CURRENT_VERSION" -lt "$MINIMUM_TEMPLATE_VERSION" ]; then
            echo "Error: wrangler.jsonc version ($CURRENT_VERSION) is below minimum template version ($MINIMUM_TEMPLATE_VERSION)"
            exit 1
          fi

      - name: Initialize Cloudflare Secrets Store
        if: ${{ github.event_name != 'pull_request' }}
        run: npx tsx scripts/init-secrets.ts
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Initialize Vectorize Indexes
        if: ${{ github.event_name != 'pull_request' }}
        run: npx tsx scripts/init-vectorize.ts
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Initialize Queues
        if: ${{ github.event_name != 'pull_request' }}
        run: npx tsx scripts/init-queues.ts
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply Database Migration
        if: ${{ github.event_name != 'pull_request' }}
        run: yes | npx wrangler d1 migrations apply --remote mail-otter-db
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Build Web App
        run: pnpm --filter @mail-otter/web build

      - name: Build API Worker
        run: pnpm --filter @mail-otter/api typecheck && pnpm --filter @mail-otter/api build 2>/dev/null || true

      - name: Prepare for Deploy
        run: |
          # Hide OpenNext config so wrangler doesn't delegate to opennextjs-cloudflare
          mv open-next.config.ts open-next.config.ts.bak 2>/dev/null || true
          mv next.config.ts next.config.ts.bak 2>/dev/null || true

      - name: Dry Run Deploy with Wrangler
        run: pnpm exec wrangler deploy --dry-run
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy with Wrangler
        if: ${{ github.event_name != 'pull_request' }}
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
