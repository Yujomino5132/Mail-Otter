name: Continuous Deployment

permissions:
  contents: read

on:
  workflow_run:
    workflows:
      - Continuous Integration
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: continuous-deployment-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: false

jobs:
  deploy-worker:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install

      - name: Prepare Wrangler Configuration
        run: pnpm exec tsx scripts/prepare-wrangler-config.ts
        env:
          WRANGLER_JSONC: ${{ vars.WRANGLER_JSONC }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Check Wrangler Configuration Version
        run: |
          CURRENT_VERSION=$(grep '"$version"' wrangler.jsonc | sed 's/.*: *\([0-9]*\).*/\1/' 2>/dev/null || echo "0")
          CURRENT_VERSION=${CURRENT_VERSION:-0}
          MINIMUM_TEMPLATE_VERSION=$(grep '"$minimumVersion"' apps/api/wrangler.template.jsonc | sed 's/.*: *\([0-9]*\).*/\1/')
          if [ "$CURRENT_VERSION" -lt "$MINIMUM_TEMPLATE_VERSION" ]; then
            echo "Error: wrangler.jsonc version ($CURRENT_VERSION) is below minimum template version ($MINIMUM_TEMPLATE_VERSION)"
            exit 1
          fi

      - name: Initialize Cloudflare Secrets
        run: pnpm exec tsx scripts/init-secrets.ts
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply Database Migration
        run: pnpm exec wrangler d1 migrations apply --remote mail-otter-db
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Build Web App
        run: pnpm --filter @mail-otter/web build

      - name: Type Check API Worker
        run: pnpm --filter @mail-otter/api typecheck

      - name: Prepare for Deploy
        run: |
          # Hide OpenNext config so wrangler doesn't delegate to opennextjs-cloudflare.
          mv open-next.config.ts open-next.config.ts.bak 2>/dev/null || true
          mv next.config.ts next.config.ts.bak 2>/dev/null || true

      - name: Dry Run Deploy with Wrangler
        run: pnpm exec wrangler deploy --dry-run
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy with Wrangler
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-pages:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    name: Deploy Cloudflare Pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install

      - name: Build Frontend
        run: pnpm --filter @mail-otter/web build

      - name: Configure Pages Service Bindings
        run: |
          if [ -z "${CLOUDFLARE_PAGES_PROJECT_NAME}" ]; then
            echo "CLOUDFLARE_PAGES_PROJECT_NAME repository variable is required"
            exit 1
          fi
          cp apps/web/wrangler.template.jsonc wrangler.jsonc
        env:
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}

      - name: Deploy with Wrangler Pages
        run: |
          pnpm exec wrangler pages deploy \
            --project-name "${CLOUDFLARE_PAGES_PROJECT_NAME}" \
            --branch "${DEPLOY_BRANCH}" \
            --commit-hash "${DEPLOY_SHA}" \
            --commit-message "$(git log -1 --pretty=%s)"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
          DEPLOY_BRANCH: ${{ github.event.workflow_run.head_branch || github.ref_name }}
          DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
